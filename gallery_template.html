<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografia Tymancja - {{ gallery_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <header class="gallery-header">
        <div class="header-content">
            <h1 class="site-title"><a href="index.html">Fotografia Tymancja</a></h1>
            <nav class="main-nav">
                <a href="index.html">Galerie</a>
                <a href="contact.html">Kontakt</a>
            </nav>
        </div>
        <div class="gallery-info">
            <h2>{{ gallery_title }}</h2>
            <div class="description">
                {{ description }}
            </div>
        </div>
    </header>

    <main class="gallery-container">
        <div class="masonry-grid">
            {{ photos_html }}
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2025 Fotografia Tymancja</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
