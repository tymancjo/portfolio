<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografia Tymancja</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <header class="index-header">
        <h1 class="site-title">Fotografia Tymancja</h1>
        <nav class="main-nav">
            <a href="index.html" class="active">Galerie</a>
            <a href="articles.html">Teksty</a>
            <a href="contact.html">Kontakt</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-portrait">
            <img src="tymancjo/22-05-25_DSCF2704_Zielony.jpg" alt="Fotograf">
        </div>
        <div class="hero-bio">
            {{ bio_html }}
        </div>
    </section>

    {{ changelog_section_html }}

    <main class="index-container">
        <div class="section-inner">
            <h2 class="section-heading">Galerie</h2>
            <div class="gallery-links-grid" id="gallery-links">
                {{ gallery_links }}
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; {{ year }} Fotografia Tymancja</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
