<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografia Tymancja - {{ collection_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <header class="gallery-header">
        <div class="header-content">
            <h1 class="site-title"><a href="index.html">Fotografia Tymancja</a></h1>
            <nav class="main-nav">
                <a href="index.html">Galerie</a>
                <a href="articles.html">Teksty</a>
                <a href="contact.html">Kontakt</a>
            </nav>
        </div>
    </header>

    <main class="gallery-layout">
        <aside class="gallery-info">
            <div class="breadcrumb"><a href="index.html">← Galerie</a></div>
            <h2>{{ collection_title }}</h2>
            <div class="description">
                {{ description }}
            </div>
        </aside>

        <div class="gallery-container">
            <div class="gallery-links-grid">
                {{ subgallery_links }}
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; {{ year }} Fotografia Tymancja</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
