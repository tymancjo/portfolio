name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync

      - name: Build
        run: uv run python build.py

      - name: Assemble deploy dir
        run: |
          mkdir _deploy

          # Generated HTML pages (skip source templates)
          for f in *.html; do
            [[ "$f" != *_template.html ]] && cp "$f" _deploy/
          done

          # Static assets
          cp style.css main.js .nojekyll _deploy/

          # Photos (originals + thumbnails)
          cp -r photos _deploy/

          # Portrait image
          [ -d tymancjo ] && cp -r tymancjo _deploy/

          # Article media (uploaded images referenced in articles)
          if [ -d articles ]; then
            for d in articles/*/media; do
              if [ -d "$d" ]; then
                mkdir -p "_deploy/$d"
                cp "$d"/* "_deploy/$d/" 2>/dev/null || true
              fi
            done
          fi

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
